<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | ANKITA.</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Cormorant+Garamond:wght@600;700&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #161616;
            --accent: #d4af37;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --border: #262626;
            --radius: 12px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
        }

        .logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 50px;
            color: var(--accent);
            text-align: center;
        }

        .nav-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            color: var(--text-secondary);
            text-decoration: none;
            border-radius: var(--radius);
            margin-bottom: 8px;
            transition: var(--transition);
        }

        .nav-item i {
            margin-right: 12px;
            font-size: 20px;
        }

        .nav-item:hover,
        .nav-item.active {
            background: rgba(212, 175, 55, 0.1);
            color: var(--accent);
        }

        /* Main Content */
        .main-content {
            margin-left: 260px;
            flex: 1;
            padding: 40px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .btn-add {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 12px 24px;
            border-radius: var(--radius);
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: var(--transition);
        }

        .btn-add:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
        }

        /* Table */
        .table-container {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 16px 24px;
            background: rgba(255, 255, 255, 0.03);
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        td {
            padding: 16px 24px;
            border-top: 1px solid var(--border);
            vertical-align: middle;
        }

        .product-img {
            width: 48px;
            height: 48px;
            border-radius: 8px;
            object-fit: cover;
        }

        .action-btns {
            display: flex;
            gap: 12px;
        }

        .btn-icon {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 18px;
            transition: var(--transition);
        }

        .btn-icon:hover {
            color: var(--accent);
        }

        .btn-delete:hover {
            color: #ff4d4d;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: var(--bg-secondary);
            padding: 40px;
            border-radius: var(--radius);
            width: 500px;
            max-width: 90%;
            border: 1px solid var(--border);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            color: white;
            padding: 12px;
            border-radius: 8px;
            outline: none;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 30px;
        }

        .btn-cancel {
            background: none;
            border: 1px solid var(--border);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
        }

        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            background: rgba(212, 175, 55, 0.1);
            color: var(--accent);
        }
    </style>
</head>

<body>
    <div class="sidebar">
        <div class="logo">ANKITA.</div>
        <a href="#" class="nav-item active" onclick="showTab('dashboard')"><i class="ri-dashboard-line"></i>
            Dashboard</a>
        <a href="#" class="nav-item" onclick="showTab('products')"><i class="ri-shopping-bag-line"></i> Products</a>
        <a href="#" class="nav-item" onclick="showTab('orders')"><i class="ri-list-check-2"></i> Orders</a>
        <a href="#" class="nav-item" onclick="showTab('analytics')"><i class="ri-bar-chart-box-line"></i> Analytics</a>
        <a href="/" class="nav-item" style="margin-top: auto;"><i class="ri-logout-box-line"></i> View Site</a>
    </div>

    <div class="main-content">
        <!-- Dashboard Tab -->
        <div id="dashboard-tab" class="tab-content">
            <header>
                <h1>Welcome, Admin</h1>
            </header>
            <div class="stats-grid" id="statsGrid"
                style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 40px;">
                <!-- Stats Cards -->
            </div>
        </div>

        <!-- Products Tab -->
        <div id="products-tab" class="tab-content" style="display:none;">
            <header>
                <h1>Product Management</h1>
                <button class="btn-add" onclick="openModal()"><i class="ri-add-line"></i> Add Product</button>
            </header>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Img</th>
                            <th>Name</th>
                            <th>Price</th>
                            <th>Category</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="productList"></tbody>
                </table>
            </div>
        </div>

        <!-- Orders Tab -->
        <div id="orders-tab" class="tab-content" style="display:none;">
            <header>
                <h1>Recent Orders</h1>
            </header>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Customer</th>
                            <th>Total</th>
                            <th>Status</th>
                            <th>Date</th>
                        </tr>
                    </thead>
                    <tbody id="orderList"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Product Modal -->
    <div id="productModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle">Product Details</h2>
            <form id="productForm">
                <input type="hidden" id="productId">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" id="pName" required>
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <select id="pCategory">
                        <option value="Sarees">Sarees</option>
                        <option value="Lehengas">Lehengas</option>
                        <option value="Fabrics">Fabrics</option>
                        <option value="Aari Work">Aari Work</option>
                    </select>
                </div>
                <div class="form-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div><label>Price</label><input type="number" id="pPrice" required></div>
                    <div><label>Old Price</label><input type="number" id="pOldPrice"></div>
                </div>
                <div class="form-group">
                    <label>Upload Image</label>
                    <input type="file" id="pImageFile" accept="image/*" onchange="uploadImage(this)">
                    <input type="hidden" id="pImage">
                    <div id="uploadStatus" style="font-size:12px; margin-top:5px; color:var(--accent);"></div>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-cancel" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn-add">Save</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function showTab(tab) {
            document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(tab + '-tab').style.display = 'block';
            event.currentTarget.classList.add('active');
            if (tab === 'products') fetchProducts();
            if (tab === 'orders') fetchOrders();
            if (tab === 'dashboard' || tab === 'analytics') fetchStats();
        }

        async function fetchStats() {
            const res = await fetch('/api/stats');
            const data = await res.json();
            const grid = document.getElementById('statsGrid');
            grid.innerHTML = `
                <div class="table-container" style="padding:20px; text-align:center;">
                    <div style="color:var(--text-secondary); font-size:12px;">TOTAL REVENUE</div>
                    <div style="font-size:24px; font-weight:700; color:var(--accent);">₹${(data.revenue || 0).toLocaleString()}</div>
                </div>
                <div class="table-container" style="padding:20px; text-align:center;">
                    <div style="color:var(--text-secondary); font-size:12px;">TOTAL ORDERS</div>
                    <div style="font-size:24px; font-weight:700;">${data.orders}</div>
                </div>
                <div class="table-container" style="padding:20px; text-align:center;">
                    <div style="color:var(--text-secondary); font-size:12px;">PRODUCTS</div>
                    <div style="font-size:24px; font-weight:700;">${data.products}</div>
                </div>
                <div class="table-container" style="padding:20px; text-align:center;">
                    <div style="color:var(--text-secondary); font-size:12px;">CUSTOMERS</div>
                    <div style="font-size:24px; font-weight:700;">${data.users}</div>
                </div>
            `;
        }

        async function uploadImage(input) {
            const status = document.getElementById('uploadStatus');
            status.innerText = "Uploading...";
            const formData = new FormData();
            formData.append('image', input.files[0]);
            const res = await fetch('/api/upload', { method: 'POST', body: formData });
            const data = await res.json();
            document.getElementById('pImage').value = data.filePath;
            status.innerText = "Upload complete!";
        }

        async function fetchOrders() {
            const res = await fetch('/api/orders');
            const data = await res.json();
            const list = document.getElementById('orderList');
            list.innerHTML = data.map(o => `
                <tr>
                    <td>#${o.id}</td>
                    <td>${o.user_email}</td>
                    <td>₹${o.total.toLocaleString()}</td>
                    <td><span class="badge">${o.status}</span></td>
                    <td>${new Date(o.created_at).toLocaleDateString()}</td>
                </tr>
            `).join('');
        }

        async function fetchProducts() {
            const res = await fetch('/api/products');
            const data = await res.json();
            document.getElementById('productList').innerHTML = data.map(p => `
                <tr>
                    <td><img src="${p.image}" style="width:40px; height:40px; border-radius:5px; object-fit:cover;"></td>
                    <td>${p.name}</td>
                    <td>₹${p.price.toLocaleString()}</td>
                    <td>${p.category || 'None'}</td>
                    <td><button class="btn-icon" onclick='editProduct(${JSON.stringify(p)})'><i class="ri-edit-line"></i></button></td>
                </tr>
            `).join('');
        }

        // Initialize
        fetchStats();
    </script>
</body>

</html>
