<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | ANKITA.</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Cormorant+Garamond:wght@600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #161616;
            --accent: #d4af37;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --border: #262626;
            --radius: 12px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
        }

        .logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 50px;
            color: var(--accent);
            text-align: center;
        }

        .nav-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            color: var(--text-secondary);
            text-decoration: none;
            border-radius: var(--radius);
            margin-bottom: 8px;
            transition: var(--transition);
        }

        .nav-item i {
            margin-right: 12px;
            font-size: 20px;
        }

        .nav-item:hover, .nav-item.active {
            background: rgba(212, 175, 55, 0.1);
            color: var(--accent);
        }

        /* Main Content */
        .main-content {
            margin-left: 260px;
            flex: 1;
            padding: 40px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .btn-add {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 12px 24px;
            border-radius: var(--radius);
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: var(--transition);
        }

        .btn-add:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
        }

        /* Table */
        .table-container {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 16px 24px;
            background: rgba(255, 255, 255, 0.03);
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        td {
            padding: 16px 24px;
            border-top: 1px solid var(--border);
            vertical-align: middle;
        }

        .product-img {
            width: 48px;
            height: 48px;
            border-radius: 8px;
            object-fit: cover;
        }

        .action-btns {
            display: flex;
            gap: 12px;
        }

        .btn-icon {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 18px;
            transition: var(--transition);
        }

        .btn-icon:hover {
            color: var(--accent);
        }

        .btn-delete:hover {
            color: #ff4d4d;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: var(--bg-secondary);
            padding: 40px;
            border-radius: var(--radius);
            width: 500px;
            max-width: 90%;
            border: 1px solid var(--border);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .form-group input, .form-group select {
            width: 100%;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            color: white;
            padding: 12px;
            border-radius: 8px;
            outline: none;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 30px;
        }

        .btn-cancel {
            background: none;
            border: 1px solid var(--border);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
        }

        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            background: rgba(212, 175, 55, 0.1);
            color: var(--accent);
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">ANKITA.</div>
        <a href="#" class="nav-item active"><i class="ri-dashboard-line"></i> Dashboard</a>
        <a href="#" class="nav-item"><i class="ri-shopping-bag-line"></i> Products</a>
        <a href="#" class="nav-item"><i class="ri-user-line"></i> Customers</a>
        <a href="#" class="nav-item"><i class="ri-settings-3-line"></i> Settings</a>
        <a href="/" class="nav-item" style="margin-top: auto;"><i class="ri-logout-box-line"></i> View Site</a>
    </div>

    <div class="main-content">
        <header>
            <h1>Product Management</h1>
            <button class="btn-add" onclick="openModal()"><i class="ri-add-line"></i> Add New Product</button>
        </header>

        <div class="table-container">
            <table id="productTable">
                <thead>
                    <tr>
                        <th>Image</th>
                        <th>Product Name</th>
                        <th>Price</th>
                        <th>Badge</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="productList">
                    <!-- Products will be loaded here -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Add/Edit Modal -->
    <div id="productModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle" style="margin-bottom: 24px;">Add New Product</h2>
            <form id="productForm">
                <input type="hidden" id="productId">
                <div class="form-group">
                    <label>Product Name</label>
                    <input type="text" id="pName" required>
                </div>
                <div class="form-group">
                    <label>Price (₹)</label>
                    <input type="number" id="pPrice" required>
                </div>
                <div class="form-group">
                    <label>Old Price (Optional)</label>
                    <input type="number" id="pOldPrice">
                </div>
                <div class="form-group">
                    <label>Badge (e.g., New, Sale)</label>
                    <input type="text" id="pBadge">
                </div>
                <div class="form-group">
                    <label>Image URL</label>
                    <input type="text" id="pImage" required>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-cancel" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn-add">Save Product</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const modal = document.getElementById('productModal');
        const form = document.getElementById('productForm');
        let isEditing = false;

        async function fetchProducts() {
            const response = await fetch('/api/products');
            const products = await response.json();
            const list = document.getElementById('productList');
            list.innerHTML = '';

            products.forEach(p => {
                list.innerHTML += `
                    <tr>
                        <td><img src="${p.image}" class="product-img"></td>
                        <td>${p.name}</td>
                        <td>₹${p.price.toLocaleString()}</td>
                        <td><span class="badge">${p.badge || 'None'}</span></td>
                        <td>
                            <div class="action-btns">
                                <button class="btn-icon" onclick="editProduct(${JSON.stringify(p).replace(/"/g, '&quot;')})"><i class="ri-edit-line"></i></button>
                                <button class="btn-icon btn-delete" onclick="deleteProduct(${p.id})"><i class="ri-delete-bin-line"></i></button>
                            </div>
                        </td>
                    </tr>
                `;
            });
        }

        function openModal() {
            modal.style.display = 'flex';
            document.getElementById('modalTitle').innerText = 'Add New Product';
            form.reset();
            isEditing = false;
        }

        function closeModal() {
            modal.style.display = 'none';
        }

        function editProduct(p) {
            openModal();
            document.getElementById('modalTitle').innerText = 'Edit Product';
            document.getElementById('productId').value = p.id;
            document.getElementById('pName').value = p.name;
            document.getElementById('pPrice').value = p.price;
            document.getElementById('pOldPrice').value = p.oldPrice || '';
            document.getElementById('pBadge').value = p.badge || '';
            document.getElementById('pImage').value = p.image;
            isEditing = true;
        }

        async function deleteProduct(id) {
            if(confirm('Are you sure you want to delete this product?')) {
                await fetch(`/api/products/${id}`, { method: 'DELETE' });
                fetchProducts();
            }
        }

        form.onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('productId').value;
            const data = {
                name: document.getElementById('pName').value,
                price: parseInt(document.getElementById('pPrice').value),
                oldPrice: parseInt(document.getElementById('pOldPrice').value) || null,
                badge: document.getElementById('pBadge').value || null,
                image: document.getElementById('pImage').value
            };

            const url = isEditing ? `/api/products/${id}` : '/api/products';
            const method = isEditing ? 'PUT' : 'POST';

            await fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            closeModal();
            fetchProducts();
        };

        fetchProducts();
    </script>
</body>
</html>
