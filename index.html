<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>ANKITA. | Premium Ethnic Wear</title>
  
  <meta name="google-site-verification" content="50da20f8141c89d8" />

  <!-- FONTS (UPGRADED) -->
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet">

  <!-- ICONS -->
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">

  <style>
    /* RESET */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: #fff;
      color: #111;
    }

    /* NAVBAR */
    .navbar {
      padding: 15px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #eee;
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-weight: 700;
    }

    .cart-btn {
      position: relative;
      cursor: pointer;
    }

    .cart-count {
      position: absolute;
      top: -5px;
      right: -10px;
      background: black;
      color: white;
      font-size: 12px;
      padding: 2px 6px;
      border-radius: 50%;
    }

    /* HERO */
    .hero {
      padding: 100px 40px;
      text-align: center;
    }

    .hero h1 {
      font-family: 'Playfair Display';
      font-size: 42px;
    }

    .hero p {
      margin-top: 10px;
      color: #555;
    }

    /* PRODUCTS */
    .products {
      padding: 60px 40px;
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 30px;
    }

    .product-card {
      border: 1px solid #eee;
      padding: 15px;
      transition: 0.3s;
    }

    .product-card:hover {
      transform: translateY(-5px);
    }

    .product-img {
      width: 100%;
      height: 300px;
      object-fit: cover;
      transition: 0.4s;
    }

    .product-card:hover .product-img {
      transform: scale(1.05);
    }

    .product-card h3 {
      margin-top: 10px;
      font-size: 16px;
    }

    .product-card p {
      margin: 5px 0;
    }

    .product-card button {
      padding: 8px 12px;
      background: black;
      color: white;
      border: none;
      cursor: pointer;
    }

    /* CART */
    .cart {
      position: fixed;
      right: 0;
      top: 0;
      width: 300px;
      height: 100%;
      background: #fff;
      border-left: 1px solid #eee;
      padding: 20px;
      display: none;
    }

    .cart h3 {
      margin-bottom: 20px;
    }

    .cart-item {
      margin-bottom: 10px;
    }

    .checkout {
      margin-top: 20px;
      width: 100%;
      padding: 10px;
      background: black;
      color: white;
      border: none;
    }
  </style>
</head>

<body>

  <!-- NAVBAR -->
  <div class="navbar">
    <div class="logo">ANKITA.</div>
    <div class="cart-btn" onclick="toggleCart()">
      <i class="ri-shopping-bag-line"></i>
      <span class="cart-count">0</span>
    </div>
  </div>

  <!-- HERO -->
  <section class="hero">
    <h1>Elegance in Every Thread</h1>
    <p>Luxury ethnic wear for modern women</p>
  </section>

  <!-- PRODUCTS -->
  <section class="products">
    <div class="product-grid" id="productGrid"></div>
  </section>

  <!-- CART -->
  <div class="cart" id="cart">
    <h3>Your Cart</h3>
    <div id="cartItems"></div>
    <h4 id="total">Total: ₹0</h4>
    <button class="checkout" onclick="checkout()">Checkout</button>
  </div>

  <script>

    /* PRODUCTS DATA */
    const products = [
      {
        id: 1,
        name: "Banarasi Saree",
        price: 4999,
        image: "https://images.unsplash.com/photo-1610030469983-98e550d6193c"
      },
      {
        id: 2,
        name: "Bridal Lehenga",
        price: 12999,
        image: "https://images.unsplash.com/photo-1593032465175-481ac7f401a0"
      },
      {
        id: 3,
        name: "Designer Kurti",
        price: 1999,
        image: "https://images.unsplash.com/photo-1583391733956-6c78276477e2"
      }
    ];

    /* RENDER PRODUCTS */
    const grid = document.getElementById("productGrid");

    grid.innerHTML = products.map(p => `
  <div class="product-card">
    <img src="${p.image}" class="product-img">
    <h3>${p.name}</h3>
    <p>₹${p.price}</p>
    <button onclick="addToCart(${p.id})">Add to Cart</button>
  </div>
`).join("");

    /* CART LOGIC */
    let cart = [];

    function addToCart(id) {
      const product = products.find(p => p.id === id);
      cart.push(product);
      updateCart();
    }

    function updateCart() {
      document.querySelector(".cart-count").innerText = cart.length;

      const items = document.getElementById("cartItems");

      items.innerHTML = cart.map(item => `
    <div class="cart-item">
      ${item.name} - ₹${item.price}
    </div>
  `).join("");

      const total = cart.reduce((sum, item) => sum + item.price, 0);

      document.getElementById("total").innerText = "Total: ₹" + total;
    }

    /* CART TOGGLE */
    function toggleCart() {
      const cartBox = document.getElementById("cart");
      cartBox.style.display = cartBox.style.display === "block" ? "none" : "block";
    }

    /* CHECKOUT */
    function checkout() {
      alert("Order placed successfully!");
    }

  </script>

</body>

</html>
